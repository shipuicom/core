<sh-card variant="type-c">
  <sh-tabs class="primary" [(value)]="view">
    <h3 class="title" style="display: flex; gap: 8px; align-items: center; margin: 0">
      {{ title() }}
      @if (configName()) {
        <app-config-indicator [componentName]="configName()!" style="margin-top: 12px" />
      }
    </h3>

    <button tab value="typescript">
      <sh-icon>brackets-curly</sh-icon>
      Typescript
    </button>

    <button tab value="styles">
      <sh-icon>paint-brush-broad</sh-icon>
      Styles
    </button>

    <button tab value="markup">
      <sh-icon>code</sh-icon>
      Markup
    </button>
  </sh-tabs>

  <div class="description">
    <ng-content select="[description]" />
  </div>

  @if (view() !== '') {
    <div class="content">
      @defer (when (view() === 'typescript')) {
        <app-highlight-file [class.hidden]="view() !== 'typescript'" lang="ts" [path]="path()" />
      }

      @defer (when (view() === 'markup')) {
        <app-highlight-file [class.hidden]="view() !== 'markup'" lang="html" [path]="path()" />
      }

      @defer (when (view() === 'styles')) {
        <app-highlight-file [class.hidden]="view() !== 'styles'" lang="scss" [path]="path()" />
      }
    </div>
  }

  <div class="example-wrap" [class.no-space]="noSpace()">
    <ng-content />
  </div>
</sh-card>
