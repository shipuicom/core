<h1>Input Mask</h1>
<!-- @keywords: input, mask, formatting, text field, validation, number mask, pattern, telephone, credit card -->

<app-property-viewer>
  <section>
    <h4>Enable Masking</h4>
    <p>
      Apply the
      <code>[shInputMask]</code>
      directive to an input element to enforce a specific format. You can pass a static mask string (e.g.,
      <code>"(00) 000-000"</code>
      ) or a custom formatting function.
    </p>
  </section>
</app-property-viewer>

<app-previewer path="/input-mask/examples/base-input-mask/base-input-mask" title="Default">
  <app-base-input-mask class="example" />
</app-previewer>
