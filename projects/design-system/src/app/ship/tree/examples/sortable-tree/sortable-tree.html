<div class="sortable-demo">
  <div class="tree-wrapper">
    <sh-tree [(items)]="nodes" [sortableManager]="manager">
      <sh-icon openIcon>folder-open</sh-icon>
      <sh-icon closedIcon>folder</sh-icon>

      <ng-template #dirTemplate let-node>
        <sh-tree-node>
          @if (node.isOpen) {
            <sh-icon size="small">folder-open</sh-icon>
          } @else {
            <sh-icon size="small">folder</sh-icon>
          }
          {{ node.name }}
        </sh-tree-node>
      </ng-template>

      <ng-template #nodeTemplate let-node>
        <sh-tree-node>
          <sh-icon size="small">file</sh-icon>
          {{ node.name }}
        </sh-tree-node>
      </ng-template>
    </sh-tree>
  </div>

  <div class="state-panel">
    <div class="state-header">
      <sh-icon size="small">code</sh-icon>
      <span>Live State</span>
    </div>
    <pre class="state-json">{{ nodesJson() }}</pre>
  </div>
</div>
