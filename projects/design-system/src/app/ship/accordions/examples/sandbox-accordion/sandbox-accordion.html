<div class="controls">
  <p>Controls</p>
  <header>
    <div class="row">
      <sh-toggle [(checked)]="allowMultiple" class="primary raised">Allow Multiple Open</sh-toggle>
      <sh-select
        class="raised primary"
        color="primary"
        variant="raised"
        [selectMultiple]="allowMultiple()"
        [options]="availablePanels"
        [(selectedOptions)]="selectedPanelsArray">
        <label>Open Panels</label>
        <input type="text" style="display: none" />
      </sh-select>

      <sh-select
        class="raised primary"
        color="primary"
        variant="raised"
        [options]="availableVariants"
        label="label"
        value="value"
        [isClearable]="false"
        [(ngModel)]="variantType">
        <label>Variant</label>
        <input type="text" style="display: none" />
      </sh-select>
    </div>
  </header>
</div>

<div class="sandbox">
  <sh-accordion [(value)]="openPanels" [allowMultiple]="allowMultiple()" [variant]="variantType()">
    <details value="panel1">
      <summary>Personal Information</summary>
      <p>
        This is standard content projected inside native HTML tags! The entire accordion is configured seamlessly with
        DOM structure.
      </p>
    </details>

    <details value="panel2">
      <summary>Advanced Settings</summary>
      <sh-form-field>
        <label>Settings A</label>
        <input type="text" value="Configuration" />
      </sh-form-field>
    </details>

    <details value="panel3">
      <summary>Danger Zone</summary>
      <button shButton color="error" variant="flat" size="small">Delete Account</button>
    </details>
  </sh-accordion>
</div>
