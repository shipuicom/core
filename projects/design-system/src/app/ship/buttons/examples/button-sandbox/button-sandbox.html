<div class="controls">
  <p>Controls</p>
  <header>
    <div class="row">
      <!-- <sh-toggle [(checked)]="isSmall" class="primary raised">Small</sh-toggle> -->

      <sh-button-group class="small type-b" [(value)]="sizeClass">
        <button value="">Normal</button>
        <button value="small">Small</button>
        <button value="xsmall">XSmall</button>
      </sh-button-group>

      <sh-toggle [(checked)]="isRotated" color="primary" variant="raised">Rotated</sh-toggle>
      <sh-toggle [(checked)]="isLoading" color="primary" variant="raised">Loading</sh-toggle>
      <sh-toggle [(checked)]="isDisabled" color="primary" variant="raised">Disabled</sh-toggle>
      <sh-toggle [(checked)]="isReadonly" color="primary" variant="raised">Readonly</sh-toggle>
    </div>

    <div class="row">
      <sh-button-group class="small type-b" [(value)]="colorClass">
        <button value="">Default</button>
        <button value="primary">Primary</button>
        <button value="accent">Accent</button>
        <button value="warn">Warn</button>
        <button value="error">Error</button>
        <button value="success">Success</button>
      </sh-button-group>

      <sh-button-group class="small type-b" [(value)]="variationClass">
        <button value="">Default</button>
        <button value="simple">Simple</button>
        <button value="outlined">Outlined</button>
        <button value="flat">Flat</button>
        <button value="raised">Raised</button>
      </sh-button-group>
    </div>
  </header>
</div>

<div class="sandbox">
  <button
    shButton
    [color]="colorClass()"
    [variant]="variationClass()"
    [size]="sizeClass()"
    [class.loading]="isLoading()"
    [class.rotated-icon]="isRotated()"
    [disabled]="isDisabled()"
    [attr.readonly]="isReadonly() ? true : null">
    <sh-icon>caret-down</sh-icon>
  </button>

  <button
    shButton
    [color]="colorClass()"
    [variant]="variationClass()"
    [size]="sizeClass()"
    [class.loading]="isLoading()"
    [class.rotated-icon]="isRotated()"
    [disabled]="isDisabled()"
    [attr.readonly]="isReadonly() ? true : null">
    <sh-icon>caret-down</sh-icon>
    Default
    <sh-icon>caret-down</sh-icon>
  </button>

  <button
    shButton
    [color]="colorClass()"
    [variant]="variationClass()"
    [size]="sizeClass()"
    [class.loading]="isLoading()"
    [class.rotated-icon]="isRotated()"
    [disabled]="isDisabled()"
    [attr.readonly]="isReadonly() ? true : null">
    <sh-icon>caret-down</sh-icon>
    Primary
  </button>

  <button
    shButton
    [color]="colorClass()"
    [variant]="variationClass()"
    [size]="sizeClass()"
    [class.loading]="isLoading()"
    [class.rotated-icon]="isRotated()"
    [disabled]="isDisabled()"
    [attr.readonly]="isReadonly() ? true : null">
    Primary
    <sh-icon>caret-down</sh-icon>
  </button>
</div>
