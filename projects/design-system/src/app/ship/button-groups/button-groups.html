<h1>Button Group</h1>
<!-- @keywords: button, group, joined, grouped, cluster, segment -->

<app-property-viewer>
  <section>
    <h4>Sizes</h4>
    <p>
      Use the
      <code>size</code>
      attribute to change the scale of the group, e.g.,
      <code>size="small"</code>
      .
    </p>
  </section>

  <section>
    <h4>Active State</h4>
    <p>
      Apply the
      <code>active</code>
      attribute or class to a button within the group to highlight it as the current selection.
    </p>
  </section>
</app-property-viewer>

<div>
  <sh-toggle [(checked)]="small">Small</sh-toggle>

</div>

<app-previewer
  path="/button-groups/examples/base-button-group/base-button-group"
  title="Default"
  configName="buttonGroup">
  <app-base-button-group class="example" [small]="small()" />
</app-previewer>
