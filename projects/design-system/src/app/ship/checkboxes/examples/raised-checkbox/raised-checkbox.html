<sh-checkbox [(checked)]="active" variant="raised" />
<sh-checkbox [(checked)]="active" variant="raised" color="primary" />
<sh-checkbox [(checked)]="active" variant="raised" color="accent" />
<sh-checkbox [(checked)]="active" variant="raised" color="warn" />
<sh-checkbox [(checked)]="active" variant="raised" color="error" />
<sh-checkbox [(checked)]="active" variant="raised" color="success" />
<sh-checkbox [(checked)]="active" variant="raised" [disabled]="true" />

<sh-checkbox variant="raised" color="primary">
  Checkbox with ngModel
  <input type="checkbox" [(ngModel)]="active" />
</sh-checkbox>

<sh-checkbox variant="raised" color="primary">
  Checkbox with input reactive forms {{ formCtrl.value }}
  <input type="checkbox" [formControl]="formCtrl" />
</sh-checkbox>
